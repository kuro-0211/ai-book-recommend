<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}AI 책 추천{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      background: #fafafa;
      color: #222;
      line-height: 1.55;
    }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #666; margin-top: 0; margin-bottom: 28px; }
    form { display: flex; gap: 8px; margin-bottom: 24px; }
    input[type=text] {
      flex: 1; padding: 12px 14px; font-size: 16px;
      border: 1px solid #ccc; border-radius: 8px; background: #fff;
    }
    button {
      padding: 12px 20px; font-size: 16px; cursor: pointer;
      background: #2b6cb0; color: #fff; border: none; border-radius: 8px;
    }
    button:hover { background: #2c5282; }
    .error { color: #c53030; background: #fff5f5; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
    .card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 18px 20px; margin-bottom: 14px;
    }
    .card h3 { margin: 0 0 4px; }
    .card .author { color: #4a5568; font-size: 14px; margin-bottom: 10px; }
    .card .summary { margin: 6px 0; }
    .card .reason {
      background: #ebf8ff; border-left: 3px solid #2b6cb0;
      padding: 8px 12px; border-radius: 4px; margin-top: 8px;
    }
    a { color: #2b6cb0; }
    .footer { margin-top: 30px; font-size: 13px; color: #888; }
    pre { background: #1a202c; color: #f7fafc; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 12px; }
    nav.topbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; background: #fff; border: 1px solid #e2e8f0;
      border-radius: 10px; margin-bottom: 24px;
    }
    nav.topbar a { margin-left: 12px; text-decoration: none; }
    nav.topbar .brand { font-weight: 700; color: #2d3748; }
    .user-pill {
      display: inline-block; background: #edf2f7; color: #2d3748;
      padding: 2px 10px; border-radius: 999px; font-size: 13px; margin-right: 6px;
    }
    form.inline { display: inline; margin: 0; }
    button.linkish {
      background: none; border: none; color: #2b6cb0; cursor: pointer;
      padding: 0; font: inherit;
    }
    button.linkish:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="topbar">
    <a class="brand" href="/">📚 AI 책 추천</a>
    <div>
      {% if user.is_authenticated %}
        <span class="user-pill">{{ user.username }}</span>
        <a href="{% url 'my_history' %}">내 추천 기록</a>
        <form class="inline" method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="linkish">로그아웃</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}">로그인</a>
        <a href="{% url 'signup' %}">회원가입</a>
      {% endif %}
    </div>
  </nav>

  {% block body %}{% endblock %}
  <div class="footer">
    <a href="/">← 처음으로</a>
  </div>
</body>
</html>
